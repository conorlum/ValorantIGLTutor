databases:
  - name: valomaths-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: valomaths
    runtime: python
    plan: free
    rootDir: webapp
    buildCommand: pip install -r requirements.txt && alembic upgrade head && python scripts/load_seed_data.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
      - key: DATABASE_URL
        fromDatabase:
          name: valomaths-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
